<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
    <title>CatHacksXII</title>

    <style>
html, body, #canvas {
    margin: 0;
    padding: 0;
    border: 0;
}

body {
    color: white;
    background-color: black;
    overflow: hidden;
    touch-action: none;
}

#canvas {
    display: block;
}

#canvas:focus {
    outline: none;
}

#status, #status-splash, #status-progress {
    position: absolute;
    left: 0;
    right: 0;
}

#status, #status-splash {
    top: 0;
    bottom: 0;
}

#status {
    background-color: #242424;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    visibility: hidden;
}

#status-splash {
    max-height: 100%;
    max-width: 100%;
    margin: auto;
}

#status-splash.show-image--false {
    display: none;
}

#status-splash.fullsize--true {
    height: 100%;
    width: 100%;
    object-fit: contain;
}

#status-splash.use-filter--false {
    image-rendering: pixelated;
}

#status-progress, #status-notice {
    display: none;
}

#status-progress {
    bottom: 10%;
    width: 50%;
    margin: 0 auto;
}

#status-notice {
    background-color: #5b3943;
    border-radius: 0.5rem;
    border: 1px solid #9b3943;
    color: #e0e0e0;
    font-family: 'Noto Sans', 'Droid Sans', Arial, sans-serif;
    line-height: 1.3;
    margin: 0 2rem;
    overflow: hidden;
    padding: 1rem;
    text-align: center;
    z-index: 1;
}
    </style>

    <link id="-gd-engine-icon" rel="icon" type="image/png" href="index.icon.png" />
    <link rel="apple-touch-icon" href="index.apple-touch-icon.png"/>

    <!-- Godot inserts engine scripts, wasm loader, service worker, etc -->
    {{{ GODOT_HEAD_INCLUDE }}}
</head>

<body>
    <canvas id="canvas">
        Your browser does not support the canvas tag.
    </canvas>

    <noscript>
        Your browser does not support JavaScript.
    </noscript>

    <!-- Your Socket.IO networking code -->
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script>
        window._socket = io("http://localhost:3000", { transports: ["websocket"] });
        window._gameEvents = [];
        window._myId = "";

        window._socket.on("connect", function() {
            window._myId = window._socket.id;
            console.log("connected:", window._myId);
        });

        var events = ["room_update","game_starting","round_start","state_update",
                    "apply_knockback","tick","round_result","game_over","player_left","error"];
        events.forEach(function(name) {
            window._socket.on(name, function(data) {
                window._gameEvents.push(JSON.stringify({type: name, data: data}));
            });
        });

        window._joinRoom = function(code, name) {
            window._socket.emit("join_room", {roomCode: code, playerName: name});
        };
        window._sendMove = function(x, y, vy, facing) {
            window._socket.emit("player_move", {x:x, y:y, vy:vy, facing:facing});
        };
    </script>

    <div id="status">
        <img id="status-splash" class="show-image--true fullsize--true use-filter--true" src="index.png" alt="">
        <progress id="status-progress"></progress>
        <div id="status-notice"></div>
    </div>

    <!-- Godot inserts index.js, Engine.startGame(), wasm loader, etc -->
    {{{ GODOT_BODY_INCLUDE }}}

    <!-- Godot inserts the GODOT_CONFIG JSON here -->
    <script>
        {{{ GODOT_CONFIG }}}
    </script>
</body>
</html>
